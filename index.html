<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Englisch-Lernzentrum · Hellweg-Realschule Unna-Massen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN-SYSTEM – warme Farbpalette (Terrakotta/Creme)
   ============================================================ */
:root{
  --hr-blue:#b85c20;       /* Terrakotta – Primär / Grammatik */
  --hr-red:#b83a22;        /* Backsteinrot – Fehler */
  --hr-green:#3d7a2e;      /* Waldgrün – Vokabeln / Erfolg */
  --hr-plum:#9b4880;       /* Pflaume – Skills */
  --hr-amber:#d97706;      /* Bernstein */
  --hr-ocker:#a16207;      /* Senf/Ocker – Übergreifend */
  --hr-wine:#7c2d12;       /* Weinrot/Rost – ZAP */

  --bg:#fef9f2;
  --card:#ffffff;
  --text:#2c1a0e;
  --muted:#7a5a42;
  --border:#e9d9c4;
  --border-strong:#d4bfa3;
  --shadow:0 2px 8px rgba(184,92,32,.08), 0 1px 3px rgba(44,26,14,.06);
  --shadow-hover:0 6px 20px rgba(184,92,32,.18), 0 2px 6px rgba(44,26,14,.10);
  --radius:16px;
  --radius-sm:10px;
}
[data-theme="dark"]{
  --bg:#1a120a;
  --card:#2a1d12;
  --text:#f4e8d8;
  --muted:#b8a088;
  --border:#4a3420;
  --border-strong:#6a4c30;
  --shadow:0 2px 8px rgba(0,0,0,.4);
  --shadow-hover:0 6px 20px rgba(216,108,40,.25);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Baloo 2',system-ui,-apple-system,sans-serif}
body{min-height:100vh;min-height:100dvh;padding:0 0 60px;transition:background .25s,color .25s}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ============================================================ HEADER ============================================================ */
.site-header{
  background:linear-gradient(135deg, var(--hr-blue) 0%, var(--hr-amber) 100%);
  color:#fff;padding:22px 20px 20px;
  box-shadow:0 3px 12px rgba(184,92,32,.25);
  position:relative;overflow:hidden;
}
.site-header::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 85% 30%, rgba(255,255,255,.18) 0%, transparent 50%);
  pointer-events:none;
}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
.brand{flex:1;min-width:250px}
.brand h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.3px;line-height:1.15}
.brand .sub{margin:4px 0 0;font-size:14px;font-weight:500;opacity:.94}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.icon-btn{
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);
  color:#fff;border-radius:12px;padding:8px 14px;
  font-size:15px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  transition:background .15s, transform .1s;
}
.icon-btn:hover{background:rgba(255,255,255,.28)}
.icon-btn:active{transform:scale(.96)}

/* Admin-Banner */
.admin-banner{
  background:#2a1d12;color:#f4e8d8;padding:10px 20px;
  font-size:14px;font-weight:600;
}
.admin-banner-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;width:100%}
.admin-banner .tools{display:flex;gap:8px;flex-wrap:wrap}
.admin-banner button{
  background:var(--hr-amber);color:#fff;border:none;border-radius:8px;
  padding:6px 12px;font-size:13px;font-weight:700;
}
.admin-banner button.secondary{background:transparent;border:1.5px solid #f4e8d8;color:#f4e8d8}
.admin-banner button.danger{background:var(--hr-red)}
.admin-banner button:active{transform:scale(.96)}

/* ============================================================ CONTROLS ============================================================ */
.controls{max-width:1200px;margin:0 auto;padding:20px 20px 0}
.search-box{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.search-box:focus-within{border-color:var(--hr-blue)}
.search-box input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:inherit;font-size:16px;font-weight:500;color:var(--text);
}
.search-icon{font-size:18px;opacity:.6}
.clear-search{
  background:var(--border);border:none;border-radius:8px;
  width:28px;height:28px;display:none;align-items:center;justify-content:center;
  font-size:14px;color:var(--text);
}
.clear-search.visible{display:flex}

.filter-group{margin-bottom:12px}
.filter-label{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);margin-bottom:6px;
}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  background:var(--card);border:2px solid var(--border);color:var(--text);
  border-radius:999px;padding:6px 14px;font-size:14px;font-weight:600;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.chip:hover{border-color:var(--border-strong)}
.chip.active{background:var(--hr-blue);color:#fff;border-color:var(--hr-blue)}
.chip.active.cat-grammatik    {background:var(--hr-blue);  border-color:var(--hr-blue)}
.chip.active.cat-vokabeln     {background:var(--hr-green); border-color:var(--hr-green)}
.chip.active.cat-skills       {background:var(--hr-plum);  border-color:var(--hr-plum)}
.chip.active.cat-uebergreifend{background:var(--hr-ocker); border-color:var(--hr-ocker)}
.chip.active.cat-zap          {background:var(--hr-wine);  border-color:var(--hr-wine)}
.chip-count{
  background:rgba(0,0,0,.12);border-radius:999px;padding:1px 7px;
  font-size:12px;font-weight:700;
}
.chip.active .chip-count{background:rgba(255,255,255,.25)}
.chip.zero{opacity:.4}

/* ============================================================ GRID ============================================================ */
.grid-wrap{max-width:1200px;margin:0 auto;padding:16px 20px 0}
.category-section{margin-bottom:28px}
.category-header{
  display:flex;align-items:center;gap:10px;
  margin:0 0 14px;padding-bottom:8px;
  border-bottom:2px solid var(--border);flex-wrap:wrap;
}
.category-header h2{
  margin:0;font-size:20px;font-weight:800;color:var(--text);
  display:inline-flex;align-items:center;gap:10px;
}
.category-header .dot{width:14px;height:14px;border-radius:4px;display:inline-block}
.category-count{font-size:13px;color:var(--muted);font-weight:600}
.category-note{font-size:13px;color:var(--muted);font-weight:500;font-style:italic;margin-left:auto}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}

.tile{
  background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow);
  transition:transform .15s, box-shadow .15s, border-color .15s;
  display:flex;flex-direction:column;gap:10px;
  position:relative;min-height:140px;cursor:pointer;
}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
.tile:active{transform:translateY(0)}
.tile.draft{opacity:.6;border-style:dashed}

.tile-cat-grammatik    {border-top:4px solid var(--hr-blue)}
.tile-cat-vokabeln     {border-top:4px solid var(--hr-green)}
.tile-cat-skills       {border-top:4px solid var(--hr-plum)}
.tile-cat-uebergreifend{border-top:4px solid var(--hr-ocker)}
.tile-cat-zap          {border-top:4px solid var(--hr-wine)}

.tile-head{display:flex;align-items:flex-start;gap:12px}
.tile-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.tile-cat-grammatik     .tile-icon{background:rgba(184,92,32,.12)}
.tile-cat-vokabeln      .tile-icon{background:rgba(61,122,46,.14)}
.tile-cat-skills        .tile-icon{background:rgba(155,72,128,.14)}
.tile-cat-uebergreifend .tile-icon{background:rgba(161,98,7,.14)}
.tile-cat-zap           .tile-icon{background:rgba(124,45,18,.14)}

.tile-title{font-size:17px;font-weight:700;line-height:1.2;margin:0;color:var(--text)}
.tile-sub{font-size:13px;color:var(--muted);margin:3px 0 0;line-height:1.35;font-weight:500}
.tile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.badge{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
  padding:3px 8px;border-radius:999px;
  background:var(--border);color:var(--muted);
}
.badge.grade    {background:rgba(184,92,32,.15);color:var(--hr-blue)}
.badge.grade-all{background:rgba(161,98,7,.15); color:var(--hr-ocker)}
.badge.grade-10 {background:rgba(124,45,18,.15);color:var(--hr-wine)}
[data-theme="dark"] .badge.grade    {background:rgba(216,118,40,.2); color:#e89558}
[data-theme="dark"] .badge.grade-all{background:rgba(202,138,4,.22); color:#eab308}
[data-theme="dark"] .badge.grade-10 {background:rgba(194,65,12,.25); color:#fb923c}

.badge.status-new    {background:var(--hr-green); color:#fff}
.badge.status-updated{background:var(--hr-amber); color:#fff}
.badge.status-draft  {background:var(--hr-red);   color:#fff}
.badge.subcat        {background:rgba(155,72,128,.14);color:var(--hr-plum)}
[data-theme="dark"] .badge.subcat{background:rgba(195,112,168,.2);color:#d98cc0}

.tile-admin{position:absolute;top:8px;right:8px;display:none;gap:4px}
body.admin-mode .tile-admin{display:flex}
body.admin-mode .tile{cursor:grab}
body.admin-mode .tile.dragging{cursor:grabbing;opacity:.5}
.tile-admin button{
  width:28px;height:28px;border-radius:8px;
  background:var(--card);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text);
}
.tile-admin button:hover{border-color:var(--hr-blue)}
.tile-admin .del:hover{border-color:var(--hr-red);color:var(--hr-red)}

.tile-hidden{filter:grayscale(.6)}
.tile-hidden::after{
  content:"ausgeblendet";position:absolute;top:8px;left:8px;
  background:var(--hr-red);color:#fff;
  font-size:10px;font-weight:700;text-transform:uppercase;
  padding:2px 6px;border-radius:6px;
}

.empty-state{
  text-align:center;padding:40px 20px;color:var(--muted);
  background:var(--card);border:2px dashed var(--border);
  border-radius:var(--radius);margin:0 20px;
}
.empty-state p{margin:8px 0;font-size:15px;font-weight:500}

/* ============================================================ MODAL ============================================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(44,26,14,.6);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;animation:fadeIn .18s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--card);color:var(--text);border-radius:var(--radius);
  max-width:540px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,.3);padding:22px;
}
.modal h3{margin:0 0 14px;font-size:20px;font-weight:800}
.modal label{
  display:block;font-size:13px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.3px;margin:12px 0 4px;
}
.modal input,.modal select,.modal textarea{
  width:100%;padding:10px 12px;background:var(--bg);color:var(--text);
  border:2px solid var(--border);border-radius:var(--radius-sm);
  font-family:inherit;font-size:15px;font-weight:500;outline:none;
}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--hr-blue)}
.modal textarea{resize:vertical;min-height:60px}
.modal-row{display:flex;gap:10px}
.modal-row > *{flex:1}
.modal-check{display:flex;align-items:center;gap:8px;margin:12px 0 4px;font-weight:600}
.modal-check input{width:auto}
.modal-actions{
  display:flex;gap:10px;justify-content:flex-end;margin-top:18px;
  padding-top:14px;border-top:1px solid var(--border);
}
.modal-actions button{padding:10px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;border:none}
.btn-primary{background:var(--hr-blue);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--hr-red);color:#fff}

/* ============================================================ FOOTER ============================================================ */
.site-footer{
  max-width:1200px;margin:30px auto 0;padding:16px 20px;
  font-size:12px;color:var(--muted);text-align:center;
  border-top:1px solid var(--border);
}
.hidden{display:none !important}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <h1>📚 Englisch-Lernzentrum</h1>
      <p class="sub">Hellweg-Realschule Unna-Massen</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="theme-toggle" title="Dark Mode umschalten" aria-label="Dark Mode umschalten">
        <span id="theme-icon">🌙</span>
        <span id="theme-label">Dunkel</span>
      </button>
    </div>
  </div>
</header>

<div class="admin-banner hidden" id="admin-banner">
  <div class="admin-banner-inner">
    <div>🔧 <b>Admin-Modus aktiv</b> · Kacheln bearbeiten und sortieren</div>
    <div class="tools">
      <button id="btn-add">➕ Neu</button>
      <button id="btn-export" class="secondary">💾 Export</button>
      <button id="btn-import" class="secondary">📂 Import</button>
      <button id="btn-reset" class="danger">🗑️ Reset</button>
      <button id="btn-exit" class="secondary">🚪 Verlassen</button>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Thema suchen … (z.B. Simple Present, Vokabeln, Reading, ZAP)" autocomplete="off">
    <button class="clear-search" id="clear-search" aria-label="Suche löschen">✕</button>
  </div>

  <div class="filter-group">
    <div class="filter-label">Jahrgang</div>
    <div class="chip-row" id="grade-filters"></div>
  </div>

  <div class="filter-group">
    <div class="filter-label">Kategorie</div>
    <div class="chip-row" id="cat-filters"></div>
  </div>
</div>

<main class="grid-wrap" id="grid-wrap"></main>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3 id="edit-title">Kachel bearbeiten</h3>
    <label>Titel</label>
    <input type="text" id="f-title" placeholder="z.B. Simple Present">
    <label>Untertitel / Kurzbeschreibung</label>
    <input type="text" id="f-sub" placeholder="z.B. Gewohnheiten · Fakten · Zeitpläne">
    <div class="modal-row">
      <div>
        <label>Jahrgang</label>
        <select id="f-grade">
          <option value="alle">jahrgangsübergreifend</option>
          <option value="5">Klasse 5</option>
          <option value="6">Klasse 6</option>
          <option value="7">Klasse 7</option>
          <option value="8">Klasse 8</option>
          <option value="9">Klasse 9</option>
          <option value="10">Klasse 10</option>
        </select>
      </div>
      <div>
        <label>Kategorie</label>
        <select id="f-cat">
          <option value="grammatik">Grammatik</option>
          <option value="vokabeln">Vokabeln</option>
          <option value="skills">Skills</option>
          <option value="uebergreifend">Übergreifend</option>
          <option value="zap">ZAP (nur Klasse 10)</option>
        </select>
      </div>
    </div>
    <label>Unter-Kategorie (optional, z.B. „Reading", „Unit 3")</label>
    <input type="text" id="f-subcat" placeholder="leer lassen wenn nicht nötig">
    <label>Dateipfad (relativ zum Dashboard)</label>
    <input type="text" id="f-file" placeholder="z.B. grammatik/05_simple_present.html">
    <div class="modal-row">
      <div>
        <label>Icon (Emoji)</label>
        <input type="text" id="f-icon" placeholder="📗" maxlength="4">
      </div>
      <div>
        <label>Status</label>
        <select id="f-status">
          <option value="ready">fertig</option>
          <option value="new">NEU</option>
          <option value="updated">aktualisiert</option>
          <option value="draft">in Arbeit (nur Admin sieht es)</option>
        </select>
      </div>
    </div>
    <div class="modal-check">
      <input type="checkbox" id="f-visible" checked>
      <label for="f-visible" style="margin:0;text-transform:none;letter-spacing:0;color:var(--text);font-size:14px">für Schüler sichtbar</label>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="edit-cancel">Abbrechen</button>
      <button class="btn-primary" id="edit-save">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:420px">
    <h3 id="confirm-title">Sicher?</h3>
    <p id="confirm-text" style="margin:0;color:var(--muted);font-weight:500">Diese Aktion kann nicht rückgängig gemacht werden.</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="confirm-cancel">Abbrechen</button>
      <button class="btn-danger" id="confirm-ok">Bestätigen</button>
    </div>
  </div>
</div>

<input type="file" id="file-import" accept=".json" style="display:none">

<footer class="site-footer">
  <div>Englisch-Lernzentrum · Hellweg-Realschule Unna-Massen</div>
  <div><span>Version 24.04.2026, 13:35</span></div>
</footer>

<script>
// ============================================================
// DEFAULT-KONFIGURATION
// ============================================================
const DEFAULT_CONFIG = {
  tiles: [
    // ---- GRAMMATIK ----
    {id:"g-05-sp", title:"Simple Present", sub:"Gewohnheiten · Fakten · Zeitpläne",

    {id:"g-06-wf", title:"Will Future", sub:"Vorhersagen · spontane Entscheidungen",

    {id:"g-09-pp", title:"Past Perfect", sub:"Vorvergangenheit · had + past participle",

     file:"uebergreifend/word_order.html", icon:"🧩", status:"ready", visible:true},

    // ---- ZAP – Zentrale Abschlussprüfung Klasse 10 (Platzhalter) ----
    {id:"z-orga",      title:"Organisatorisches – folgt bald", sub:"Termine · Ablauf · Regeln",
     category:"zap", grade:"10", subcat:"Organisatorisches",
     file:"#", icon:"📋", status:"draft", visible:false},
    {id:"z-operatoren", title:"Operatoren – folgt bald", sub:"Prüfungsbefehle (describe, analyse …)",
     category:"zap", grade:"10", subcat:"Operatoren",
     file:"#", icon:"🎯", status:"draft", visible:false},
    {id:"z-videos",    title:"Videos – folgt bald", sub:"Erklärvideos zur Prüfung",
     category:"zap", grade:"10", subcat:"Videos",
     file:"#", icon:"🎬", status:"draft", visible:false},
    {id:"z-strategie", title:"Lernstrategien & Tipps – folgen bald", sub:"Prüfungsvorbereitung",
     category:"zap", grade:"10", subcat:"Lernstrategien",
     file:"#", icon:"💡", status:"draft", visible:false},
    {id:"z-hoeren",    title:"Hörverstehen – folgt bald", sub:"Listening im ZAP-Format",
     category:"zap", grade:"10", subcat:"Hörverstehen",
     file:"#", icon:"🎧", status:"draft", visible:false},
    {id:"z-lesen",     title:"Leseverstehen – folgt bald", sub:"Reading im ZAP-Format",
     category:"zap", grade:"10", subcat:"Leseverstehen",
     file:"#", icon:"📖", status:"draft", visible:false},
    {id:"z-wortschatz",title:"Wortschatz – folgt bald", sub:"Prüfungswortschatz Klasse 10",
     category:"zap", grade:"10", subcat:"Wortschatz",
     file:"#", icon:"📚", status:"draft", visible:false},
    {id:"z-schreiben", title:"Schreiben – folgt bald", sub:"Textproduktion im ZAP-Format",
     category:"zap", grade:"10", subcat:"Schreiben",
     file:"#", icon:"✍️", status:"draft", visible:false},
  ]
};

const LS_KEY = "dashboard_config_v3";
const LS_KEYS_OLD = ["dashboard_config_v1","dashboard_config_v2"];
const THEME_KEY = "dashboard_theme_v1";

var state = loadConfig();
var filter = { search:"", grade:"alle", category:"alle" };
var isAdmin = new URLSearchParams(location.search).get("admin") === "1";
var editingId = null;
var confirmCallback = null;

function loadConfig(){
  try{
    // alte Keys aufräumen (Struktur hat sich geändert)
    LS_KEYS_OLD.forEach(k=>{ if(localStorage.getItem(k)) localStorage.removeItem(k); });
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.tiles)) return parsed;
    }
  }catch(e){console.warn("Konfig konnte nicht geladen werden:",e)}
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}
function saveConfig(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ alert("Konfiguration konnte nicht gespeichert werden: "+e.message); }
}

// Dark Mode
(function initTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved === "dark") document.documentElement.setAttribute("data-theme","dark");
  updateThemeBtn();
})();
function updateThemeBtn(){
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.getElementById("theme-icon").textContent = dark ? "☀️" : "🌙";
  document.getElementById("theme-label").textContent = dark ? "Hell" : "Dunkel";
}
document.getElementById("theme-toggle").addEventListener("click", ()=>{
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  if(dark){ document.documentElement.removeAttribute("data-theme"); localStorage.setItem(THEME_KEY,"light"); }
  else    { document.documentElement.setAttribute("data-theme","dark"); localStorage.setItem(THEME_KEY,"dark"); }
  updateThemeBtn();
});

if(isAdmin){
  document.body.classList.add("admin-mode");
  document.getElementById("admin-banner").classList.remove("hidden");
}

const GRADES = [
  {v:"alle",label:"Alle"},
  {v:"5",label:"Klasse 5"},{v:"6",label:"Klasse 6"},{v:"7",label:"Klasse 7"},
  {v:"8",label:"Klasse 8"},{v:"9",label:"Klasse 9"},{v:"10",label:"Klasse 10"},
];

/* gradeRestriction:
   - wenn gesetzt: Chip & Kategorie werden nur angezeigt, wenn der aktuelle
     Jahrgangsfilter "alle" ist ODER in der Liste enthalten ist.
   - ZAP -> nur bei "alle" oder "10" sichtbar.
*/
const CATS = [
  {v:"alle",         label:"Alle",         cls:""},
  {v:"grammatik",    label:"Grammatik",    cls:"cat-grammatik"},
  {v:"vokabeln",     label:"Vokabeln",     cls:"cat-vokabeln"},
  {v:"skills",       label:"Skills",       cls:"cat-skills"},
  {v:"uebergreifend",label:"Übergreifend", cls:"cat-uebergreifend"},
  {v:"zap",          label:"ZAP",          cls:"cat-zap", gradeRestriction:["10"]},
];

function gradeMatches(tileGrade, filterGrade){
  if(filterGrade === "alle") return true;
  if(tileGrade === "alle")   return true;
  return tileGrade === filterGrade;
}
function categoryMatches(tileCat, filterCat){
  if(filterCat === "alle") return true;
  return tileCat === filterCat;
}

function categoryAllowedForGrade(cat, gradeFilter){
  if(!cat.gradeRestriction) return true;
  if(gradeFilter === "alle") return true;
  return cat.gradeRestriction.includes(gradeFilter);
}

/* Kontextsensitive Counts – berücksichtigen den jeweils anderen aktiven Filter */
function countForGrade(gradeValue){
  return visibleTiles().filter(t =>
    gradeMatches(t.grade, gradeValue) &&
    categoryMatches(t.category, filter.category)
  ).length;
}
function countForCategory(catValue){
  return visibleTiles().filter(t =>
    categoryMatches(t.category, catValue) &&
    gradeMatches(t.grade, filter.grade)
  ).length;
}

function renderChips(){
  const gr = document.getElementById("grade-filters");
  gr.innerHTML = GRADES.map(g=>{
    const n = countForGrade(g.v);
    const active = filter.grade===g.v ? "active" : "";
    const zero = (n===0 && !active) ? "zero" : "";
    return `<button class="chip ${active} ${zero}" data-grade="${g.v}">${g.label} <span class="chip-count">${n}</span></button>`;
  }).join("");
  gr.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    filter.grade = c.dataset.grade;
    // Auto-Reset: falls die aktuell aktive Kategorie zu diesem Jahrgang nicht passt
    const currentCat = CATS.find(x=>x.v===filter.category);
    if(currentCat && !categoryAllowedForGrade(currentCat, filter.grade)){
      filter.category = "alle";
    }
    render();
  }));

  const ct = document.getElementById("cat-filters");
  ct.innerHTML = CATS
    .filter(c => categoryAllowedForGrade(c, filter.grade))
    .map(c=>{
      const n = countForCategory(c.v);
      const active = filter.category===c.v ? "active " + c.cls : "";
      const zero = (n===0 && !active) ? "zero" : "";
      return `<button class="chip ${active} ${zero}" data-cat="${c.v}">${c.label} <span class="chip-count">${n}</span></button>`;
    }).join("");
  ct.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    filter.category=c.dataset.cat; render();
  }));
}

function visibleTiles(){
  return state.tiles.filter(t => isAdmin ? true : (t.visible && t.status!=="draft"));
}

function filteredTiles(){
  const q = filter.search.trim().toLowerCase();
  return visibleTiles().filter(t=>{
    if(!gradeMatches(t.grade, filter.grade)) return false;
    if(!categoryMatches(t.category, filter.category)) return false;
    if(q){
      const hay = (t.title+" "+(t.sub||"")+" "+(t.subcat||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function catMeta(cat){
  if(cat==="grammatik")     return {label:"Grammatik",    color:"var(--hr-blue)",  icon:"📚", note:""};
  if(cat==="vokabeln")      return {label:"Vokabeln",     color:"var(--hr-green)", icon:"📒", note:""};
  if(cat==="skills")        return {label:"Skills",       color:"var(--hr-plum)",  icon:"🎯", note:"Reading · Listening · Writing"};
  if(cat==="uebergreifend") return {label:"Übergreifend", color:"var(--hr-ocker)", icon:"🧰", note:"Für alle Jahrgänge"};
  if(cat==="zap")           return {label:"ZAP",          color:"var(--hr-wine)",  icon:"📝", note:"Zentrale Abschlussprüfung · Klasse 10"};
  return {label:cat,color:"var(--muted)",icon:"•",note:""};
}

function statusBadge(s){
  if(s==="new")     return '<span class="badge status-new">NEU</span>';
  if(s==="updated") return '<span class="badge status-updated">Update</span>';
  if(s==="draft")   return '<span class="badge status-draft">in Arbeit</span>';
  return "";
}

function render(){
  renderChips();
  const wrap = document.getElementById("grid-wrap");
  const tiles = filteredTiles();

  if(tiles.length===0){
    wrap.innerHTML = `<div class="empty-state">
      <p style="font-size:36px;margin:0">🔍</p>
      <p><b>Keine Themen gefunden.</b></p>
      <p>Versuch einen anderen Filter oder eine andere Suche.</p>
    </div>`;
    return;
  }

  const order = ["grammatik","vokabeln","skills","uebergreifend","zap"];
  const groups = {};
  tiles.forEach(t=>{ if(!groups[t.category]) groups[t.category]=[]; groups[t.category].push(t); });

  let html = "";
  order.forEach(cat=>{
    if(!groups[cat] || groups[cat].length===0) return;
    const meta = catMeta(cat);
    html += `<section class="category-section" data-cat="${cat}">
      <div class="category-header">
        <h2><span class="dot" style="background:${meta.color}"></span> ${meta.icon} ${meta.label}</h2>
        <span class="category-count">${groups[cat].length} ${groups[cat].length===1?"Thema":"Themen"}</span>
        ${meta.note ? `<span class="category-note">${meta.note}</span>` : ""}
      </div>
      <div class="grid" data-cat-grid="${cat}">
        ${groups[cat].map(tileHTML).join("")}
      </div>
    </section>`;
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll(".tile").forEach(el=>{
    const id = el.dataset.id;
    el.addEventListener("click",(ev)=>{
      if(ev.target.closest(".tile-admin")) return;
      const t = state.tiles.find(x=>x.id===id);
      if(!t) return;
      if(!t.file || t.file==="#"){
        showConfirm("Kein Link","Diese Kachel hat noch keinen Dateipfad hinterlegt.",null);
        return;
      }
      location.href = t.file;
    });
  });
  wrap.querySelectorAll(".tile-admin .edit").forEach(b=>b.addEventListener("click",(e)=>{
    e.stopPropagation(); openEdit(b.dataset.id);
  }));
  wrap.querySelectorAll(".tile-admin .del").forEach(b=>b.addEventListener("click",(e)=>{
    e.stopPropagation();
    const t = state.tiles.find(x=>x.id===b.dataset.id);
    showConfirm("Kachel löschen?", `„${t.title}" wird aus dem Dashboard entfernt.`, ()=>{
      state.tiles = state.tiles.filter(x=>x.id!==b.dataset.id);
      saveConfig(); render();
    });
  }));

  if(isAdmin) enableDragDrop();
}

function tileHTML(t){
  const subcat = t.subcat ? `<span class="badge subcat">${escapeHTML(t.subcat)}</span>` : "";
  let grade;
  if(t.grade==="alle"){
    grade = '<span class="badge grade-all">alle Jahrgänge</span>';
  } else if(t.category==="zap"){
    grade = '<span class="badge grade-10">Klasse 10 · ZAP</span>';
  } else {
    grade = `<span class="badge grade">Klasse ${t.grade}</span>`;
  }
  const hiddenCls = (!t.visible && isAdmin) ? " tile-hidden" : "";
  return `<div class="tile tile-cat-${t.category}${hiddenCls}${t.status==="draft"?" draft":""}" data-id="${t.id}" draggable="${isAdmin}">
    <div class="tile-admin">
      <button class="edit" data-id="${t.id}" title="Bearbeiten">✎</button>
      <button class="del"  data-id="${t.id}" title="Löschen">🗑</button>
    </div>
    <div class="tile-head">
      <div class="tile-icon">${escapeHTML(t.icon||"📄")}</div>
      <div style="min-width:0;flex:1">
        <div class="tile-title">${escapeHTML(t.title)}</div>
        <div class="tile-sub">${escapeHTML(t.sub||"")}</div>
      </div>
    </div>
    <div class="tile-badges">
      ${grade}
      ${subcat}
      ${statusBadge(t.status)}
    </div>
  </div>`;
}

function escapeHTML(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}

const searchInput = document.getElementById("search");
const clearBtn = document.getElementById("clear-search");
searchInput.addEventListener("input", ()=>{
  filter.search = searchInput.value;
  clearBtn.classList.toggle("visible", !!filter.search);
  render();
});
clearBtn.addEventListener("click", ()=>{
  searchInput.value=""; filter.search="";
  clearBtn.classList.remove("visible");
  render();
});

function enableDragDrop(){
  document.querySelectorAll("[data-cat-grid]").forEach(grid=>{
    const tiles = grid.querySelectorAll(".tile");
    tiles.forEach(tile=>{
      tile.addEventListener("dragstart",e=>{
        tile.classList.add("dragging");
        e.dataTransfer.effectAllowed="move";
        e.dataTransfer.setData("text/plain", tile.dataset.id);
      });
      tile.addEventListener("dragend",()=>tile.classList.remove("dragging"));
      tile.addEventListener("dragover",e=>{
        e.preventDefault();
        const dragging = document.querySelector(".tile.dragging");
        if(!dragging || dragging===tile) return;
        const rect = tile.getBoundingClientRect();
        const midY = rect.top + rect.height/2;
        if(e.clientY < midY) grid.insertBefore(dragging, tile);
        else grid.insertBefore(dragging, tile.nextSibling);
      });
    });
    grid.addEventListener("drop",e=>{
      e.preventDefault();
      const cat = grid.dataset.catGrid;
      const newOrder = [...grid.querySelectorAll(".tile")].map(t=>t.dataset.id);
      const othersBefore = [];
      const othersAfter  = [];
      let seenCat = false;
      state.tiles.forEach(t=>{
        if(t.category===cat){ if(!seenCat) seenCat=true; }
        else {
          if(!seenCat) othersBefore.push(t);
          else othersAfter.push(t);
        }
      });
      const reorderedCat = newOrder.map(id=>state.tiles.find(t=>t.id===id)).filter(Boolean);
      state.tiles = [...othersBefore, ...reorderedCat, ...othersAfter];
      saveConfig();
    });
  });
}

const editModal = document.getElementById("edit-modal");
function openEdit(id){
  editingId = id;
  const t = id ? state.tiles.find(x=>x.id===id) : null;
  document.getElementById("edit-title").textContent = t ? "Kachel bearbeiten" : "Neue Kachel";
  document.getElementById("f-title").value  = t ? t.title : "";
  document.getElementById("f-sub").value    = t ? (t.sub||"") : "";
  document.getElementById("f-grade").value  = t ? t.grade : "alle";
  document.getElementById("f-cat").value    = t ? t.category : "grammatik";
  document.getElementById("f-subcat").value = t ? (t.subcat||"") : "";
  document.getElementById("f-file").value   = t ? t.file : "";
  document.getElementById("f-icon").value   = t ? (t.icon||"📄") : "📄";
  document.getElementById("f-status").value = t ? (t.status||"ready") : "ready";
  document.getElementById("f-visible").checked = t ? !!t.visible : true;
  editModal.classList.add("show");
}
function closeEdit(){ editModal.classList.remove("show"); editingId=null; }

document.getElementById("edit-cancel").addEventListener("click", closeEdit);
editModal.addEventListener("click",e=>{ if(e.target===editModal) closeEdit(); });

document.getElementById("edit-save").addEventListener("click", ()=>{
  const t = {
    id: editingId || ("t-"+Date.now().toString(36)),
    title:   document.getElementById("f-title").value.trim(),
    sub:     document.getElementById("f-sub").value.trim(),
    grade:   document.getElementById("f-grade").value,
    category:document.getElementById("f-cat").value,
    subcat:  document.getElementById("f-subcat").value.trim(),
    file:    document.getElementById("f-file").value.trim(),
    icon:    document.getElementById("f-icon").value.trim() || "📄",
    status:  document.getElementById("f-status").value,
    visible: document.getElementById("f-visible").checked,
  };
  if(!t.title){ alert("Titel fehlt."); return; }
  if(!t.file){ alert("Dateipfad fehlt."); return; }
  // ZAP-Kacheln: Jahrgang automatisch auf 10 zwingen
  if(t.category==="zap") t.grade = "10";
  if(editingId){
    const i = state.tiles.findIndex(x=>x.id===editingId);
    if(i>=0) state.tiles[i] = t;
  } else {
    state.tiles.push(t);
  }
  saveConfig();
  closeEdit();
  render();
});

const confirmModal = document.getElementById("confirm-modal");
function showConfirm(title, text, cb){
  document.getElementById("confirm-title").textContent = title;
  document.getElementById("confirm-text").textContent  = text;
  confirmCallback = cb;
  document.getElementById("confirm-ok").style.display = cb ? "" : "none";
  document.getElementById("confirm-cancel").textContent = cb ? "Abbrechen" : "OK";
  confirmModal.classList.add("show");
}
document.getElementById("confirm-cancel").addEventListener("click", ()=>{
  confirmModal.classList.remove("show"); confirmCallback=null;
});
document.getElementById("confirm-ok").addEventListener("click", ()=>{
  if(confirmCallback) confirmCallback();
  confirmModal.classList.remove("show"); confirmCallback=null;
});

document.getElementById("btn-add").addEventListener("click", ()=>openEdit(null));
document.getElementById("btn-exit").addEventListener("click", ()=>{
  const url = new URL(location.href); url.searchParams.delete("admin");
  location.href = url.toString();
});
document.getElementById("btn-export").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dashboard_config.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
});
document.getElementById("btn-import").addEventListener("click", ()=>{
  document.getElementById("file-import").click();
});
document.getElementById("file-import").addEventListener("change", e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const parsed = JSON.parse(ev.target.result);
      if(!parsed || !Array.isArray(parsed.tiles)) throw new Error("Ungültiges Format");
      showConfirm("Konfiguration importieren?",
        `${parsed.tiles.length} Kacheln gefunden. Aktuelle Konfiguration wird überschrieben.`,
        ()=>{ state = parsed; saveConfig(); render(); });
    }catch(err){
      showConfirm("Fehler","Datei konnte nicht gelesen werden: "+err.message, null);
    }
  };
  reader.readAsText(f);
  e.target.value = "";
});
document.getElementById("btn-reset").addEventListener("click", ()=>{
  showConfirm("Auf Werkseinstellungen zurücksetzen?",
    "Alle eigenen Änderungen gehen verloren.",
    ()=>{
      state = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      saveConfig(); render();
    });
});

render();
</script>
