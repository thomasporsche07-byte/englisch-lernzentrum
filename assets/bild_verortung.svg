<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="'Baloo 2', system-ui, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#bbdefb"/>
      <stop offset="1" stop-color="#e1f1fb"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c5e1a5"/>
      <stop offset="1" stop-color="#a8d18d"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7cb342"/>
      <stop offset="1" stop-color="#558b2f"/>
    </linearGradient>
  </defs>

  <!-- TOP-LABEL: at the top -->
  <text x="380" y="22" text-anchor="middle" font-weight="700" font-size="14" fill="#5d4037">↓ at the top — oben</text>

  <!-- BOTTOM-LABEL: at the bottom -->
  <text x="380" y="478" text-anchor="middle" font-weight="700" font-size="14" fill="#5d4037">↑ at the bottom — unten</text>

  <!-- LEFT-LABEL (rotated) -->
  <text x="22" y="250" text-anchor="middle" font-weight="700" font-size="14" fill="#5d4037" transform="rotate(-90 22 250)">on the left — links →</text>

  <!-- RIGHT-LABEL (rotated) -->
  <text x="738" y="250" text-anchor="middle" font-weight="700" font-size="14" fill="#5d4037" transform="rotate(90 738 250)">← on the right — rechts</text>

  <!-- BILDRAHMEN -->
  <rect x="50" y="40" width="660" height="420" fill="#fff" stroke="#b85c20" stroke-width="3" rx="10"/>

  <!-- =========== BACKGROUND (oberes Drittel) =========== -->
  <rect x="50" y="40" width="660" height="140" fill="url(#sky)"/>

  <!-- Sonne -->
  <circle cx="610" cy="85" r="22" fill="#ffd54f" stroke="#f9a825" stroke-width="2"/>
  <g stroke="#f9a825" stroke-width="2.2" stroke-linecap="round">
    <line x1="610" y1="50" x2="610" y2="42"/>
    <line x1="610" y1="120" x2="610" y2="128"/>
    <line x1="575" y1="85" x2="567" y2="85"/>
    <line x1="645" y1="85" x2="653" y2="85"/>
    <line x1="586" y1="61" x2="580" y2="55"/>
    <line x1="634" y1="61" x2="640" y2="55"/>
    <line x1="586" y1="109" x2="580" y2="115"/>
    <line x1="634" y1="109" x2="640" y2="115"/>
  </g>

  <!-- Berge -->
  <polygon points="130,180 220,80 310,180" fill="#90a4ae" stroke="#607d8b" stroke-width="1.5"/>
  <polygon points="260,180 380,55 500,180" fill="#78909c" stroke="#546e7a" stroke-width="1.5"/>
  <polygon points="430,180 520,95 610,180" fill="#90a4ae" stroke="#607d8b" stroke-width="1.5"/>
  <!-- Bergspitzen-Schnee -->
  <polygon points="365,75 380,55 395,75 388,80 372,80" fill="#fff"/>

  <!-- Wolke -->
  <ellipse cx="120" cy="80" rx="36" ry="11" fill="#fff" opacity="0.95"/>
  <ellipse cx="135" cy="72" rx="22" ry="9" fill="#fff" opacity="0.95"/>

  <!-- Vögel -->
  <path d="M280 110 q8 -8 16 0 q8 -8 16 0" stroke="#37474f" fill="none" stroke-width="2" stroke-linecap="round"/>
  <path d="M340 130 q6 -6 12 0 q6 -6 12 0" stroke="#37474f" fill="none" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Label Background -->
  <rect x="62" y="50" rx="6" ry="6" width="252" height="28" fill="#fff" stroke="#1976d2" stroke-width="1.5" opacity="0.97"/>
  <text x="188" y="69" text-anchor="middle" font-weight="800" font-size="13" fill="#1976d2">in the background — im Hintergrund</text>

  <!-- =========== MIDDLE (mittleres Drittel) =========== -->
  <rect x="50" y="180" width="660" height="130" fill="url(#grass)"/>

  <!-- Haus links -->
  <rect x="105" y="240" width="65" height="55" fill="#d2691e" stroke="#5d4037" stroke-width="1.5"/>
  <polygon points="98,240 137,205 176,240" fill="#5d4037" stroke="#3e2723" stroke-width="1.5"/>
  <rect x="125" y="265" width="20" height="30" fill="#3e2723"/>
  <rect x="148" y="252" width="14" height="14" fill="#fdd835" stroke="#3e2723" stroke-width="1"/>

  <!-- Baum mitte -->
  <rect x="375" y="250" width="10" height="42" fill="#6d4c41"/>
  <circle cx="380" cy="245" r="24" fill="#388e3c" stroke="#1b5e20" stroke-width="1.5"/>

  <!-- Hund rechts -->
  <ellipse cx="600" cy="285" rx="22" ry="11" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
  <circle cx="582" cy="278" r="8" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="585" y1="285" x2="582" y2="296" stroke="#5d4037" stroke-width="2"/>
  <line x1="595" y1="295" x2="595" y2="302" stroke="#5d4037" stroke-width="2"/>
  <line x1="605" y1="295" x2="605" y2="302" stroke="#5d4037" stroke-width="2"/>
  <line x1="615" y1="295" x2="615" y2="302" stroke="#5d4037" stroke-width="2"/>
  <line x1="618" y1="284" x2="624" y2="278" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>

  <!-- Label Middle -->
  <rect x="62" y="190" rx="6" ry="6" width="220" height="28" fill="#fff" stroke="#558b2f" stroke-width="1.5" opacity="0.97"/>
  <text x="172" y="209" text-anchor="middle" font-weight="800" font-size="13" fill="#558b2f">in the middle — in der Mitte</text>

  <!-- =========== FOREGROUND (unteres Drittel) =========== -->
  <rect x="50" y="310" width="660" height="150" fill="url(#fg)"/>

  <!-- Picknickdecke -->
  <ellipse cx="200" cy="425" rx="80" ry="14" fill="#c62828" opacity="0.9"/>
  <line x1="125" y1="423" x2="275" y2="423" stroke="#fff" stroke-width="1" opacity="0.5"/>

  <!-- Person -->
  <circle cx="380" cy="370" r="20" fill="#fdd0a2" stroke="#5d4037" stroke-width="1.8"/>
  <path d="M360 360 q20 -16 40 0" stroke="#5d4037" fill="#5d4037" stroke-width="1.5"/>
  <rect x="362" y="388" width="36" height="55" fill="#1976d2" stroke="#0d47a1" stroke-width="1.5" rx="3"/>
  <line x1="368" y1="442" x2="362" y2="460" stroke="#5d4037" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="392" y1="442" x2="398" y2="460" stroke="#5d4037" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Roter Ball -->
  <circle cx="445" cy="445" r="14" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <path d="M431 445 q14 -10 28 0 m-14 -10 v20" stroke="#fff" fill="none" stroke-width="1" opacity="0.65"/>

  <!-- Label Foreground -->
  <rect x="62" y="320" rx="6" ry="6" width="252" height="28" fill="#fff" stroke="#33691e" stroke-width="1.5" opacity="0.97"/>
  <text x="188" y="339" text-anchor="middle" font-weight="800" font-size="13" fill="#33691e">in the foreground — im Vordergrund</text>

  <!-- =========== HINWEISE: weitere Lokalisierungs-Vokabeln =========== -->
  <!-- Verbindungslinien + Labels für: behind, in front of, next to, on the right -->

  <!-- Pfeil zur Person und Ball: "next to" -->
  <path d="M413 410 q10 4 18 22" stroke="#5d4037" fill="none" stroke-width="1.4" stroke-dasharray="3,3"/>
  <text x="465" y="405" font-size="11" font-weight="700" fill="#fff">next to / neben</text>

  <!-- Pfeil Person → Hund: "behind" / "in front of" -->
  <path d="M380 350 q120 -50 220 -65" stroke="#5d4037" fill="none" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="490" y="345" font-size="11" font-weight="700" fill="#5d4037">behind / hinter ↘</text>
  <text x="385" y="395" font-size="11" font-weight="700" fill="#fff">↖ in front of / vor</text>

  <!-- =========== UNTERE LEISTE: Übersichts-Box =========== -->
  <g transform="translate(50,490)">
    <rect x="0" y="0" width="660" height="22" fill="#fef9f2" stroke="#b85c20" stroke-width="1" rx="4"/>
    <text x="10" y="15" font-size="11" font-weight="700" fill="#5d4037">📍 Tipp:</text>
    <text x="60" y="15" font-size="11" fill="#5d4037">Beschreibe immer in dieser Reihenfolge: Foreground → Middle → Background.</text>
  </g>
</svg>
