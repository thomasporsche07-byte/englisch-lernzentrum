<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Klassenzimmer: Schüler an Tischen mit Büchern und Heften, Whiteboard mit Notizen, Poster und Uhr">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4EAD5"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5A57B"/>
      <stop offset="100%" stop-color="#A8865B"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9B583"/>
      <stop offset="100%" stop-color="#B68A55"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="800" height="360" fill="url(#wall)"/>
  <!-- Floor -->
  <rect y="360" width="800" height="140" fill="url(#floor)"/>
  <!-- Floor lines -->
  <g stroke="#8B6F47" stroke-width="1" opacity="0.4">
    <line x1="0" y1="380" x2="800" y2="380"/>
    <line x1="0" y1="410" x2="800" y2="410"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="470" x2="800" y2="470"/>
  </g>

  <!-- Whiteboard (large, centered on wall) -->
  <g transform="translate(220 50)">
    <rect x="0" y="0" width="360" height="180" fill="#A8896B" rx="4"/>
    <rect x="6" y="6" width="348" height="168" fill="#FFFFFF" rx="2"/>
    <!-- Notes on whiteboard -->
    <text x="180" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1976D2">Picture Description</text>
    <line x1="60" y1="50" x2="300" y2="50" stroke="#1976D2" stroke-width="1.5"/>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="14" fill="#2B1F14">• In the foreground …</text>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="14" fill="#2B1F14">• In the background …</text>
    <text x="20" y="130" font-family="Arial, sans-serif" font-size="14" fill="#2B1F14">• It looks like / I think …</text>
    <text x="20" y="155" font-family="Arial, sans-serif" font-size="14" fill="#C62828">→ Present Progressive!</text>
    <!-- Marker tray -->
    <rect x="0" y="180" width="360" height="6" fill="#7A6651"/>
    <rect x="40" y="184" width="22" height="3" fill="#C62828"/>
    <rect x="80" y="184" width="22" height="3" fill="#1976D2"/>
    <rect x="120" y="184" width="22" height="3" fill="#2E7D32"/>
  </g>

  <!-- Clock above (right of whiteboard) -->
  <g transform="translate(640 90)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#2B1F14" stroke-width="3"/>
    <circle cx="0" cy="0" r="2" fill="#2B1F14"/>
    <!-- 12 markers -->
    <line x1="0" y1="-26" x2="0" y2="-22" stroke="#2B1F14" stroke-width="2.4"/>
    <line x1="26" y1="0" x2="22" y2="0" stroke="#2B1F14" stroke-width="2.4"/>
    <line x1="0" y1="26" x2="0" y2="22" stroke="#2B1F14" stroke-width="2.4"/>
    <line x1="-26" y1="0" x2="-22" y2="0" stroke="#2B1F14" stroke-width="2.4"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#2B1F14" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="6" stroke="#2B1F14" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Poster left (grammar) -->
  <g transform="translate(60 60)">
    <rect x="0" y="0" width="120" height="150" fill="#FCE9C7" stroke="#C68B3F" stroke-width="2" rx="4"/>
    <text x="60" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#A55A1A">TENSES</text>
    <line x1="14" y1="32" x2="106" y2="32" stroke="#C68B3F" stroke-width="1"/>
    <text x="14" y="52" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">Simple Pres.</text>
    <text x="14" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">Pres. Progr.</text>
    <text x="14" y="88" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">Simple Past</text>
    <text x="14" y="106" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">Pres. Perfect</text>
    <text x="14" y="124" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">Will Future</text>
    <circle cx="100" cy="138" r="6" fill="#C62828"/>
  </g>

  <!-- Poster right (vocab) -->
  <g transform="translate(620 180)">
    <rect x="0" y="0" width="140" height="120" fill="#D6E8FF" stroke="#1976D2" stroke-width="2" rx="4"/>
    <text x="70" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1976D2">VOCABULARY</text>
    <line x1="14" y1="32" x2="126" y2="32" stroke="#1976D2" stroke-width="1"/>
    <text x="14" y="52" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">school · class</text>
    <text x="14" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">teacher · pupil</text>
    <text x="14" y="88" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">to study · to learn</text>
    <text x="14" y="106" font-family="Arial, sans-serif" font-size="11" fill="#2B1F14">homework · test</text>
  </g>

  <!-- Window suggestion -->
  <g transform="translate(20 230)">
    <rect x="0" y="0" width="0" height="0"/>
  </g>

  <!-- Desks row 1 (foreground - 3 desks) -->
  <g>
    <!-- Desk 1 (left) -->
    <g transform="translate(80 350)">
      <ellipse cx="50" cy="78" rx="56" ry="6" fill="#000" opacity="0.18"/>
      <rect x="0" y="0" width="100" height="16" fill="url(#desk)"/>
      <rect x="0" y="0" width="100" height="6" fill="#C9A269"/>
      <rect x="6" y="16" width="6" height="60" fill="#8B6A40"/>
      <rect x="88" y="16" width="6" height="60" fill="#8B6A40"/>
      <!-- Open book -->
      <path d="M14 -8 L46 -10 L48 -3 L14 -1 Z" fill="#FFFFFF" stroke="#A8896B" stroke-width="1.2"/>
      <path d="M48 -10 L80 -8 L80 -1 L48 -3 Z" fill="#F8F4EC" stroke="#A8896B" stroke-width="1.2"/>
      <line x1="22" y1="-6" x2="42" y2="-7" stroke="#94A3B8" stroke-width="0.8"/>
      <line x1="22" y1="-3" x2="42" y2="-4" stroke="#94A3B8" stroke-width="0.8"/>
      <line x1="54" y1="-7" x2="74" y2="-6" stroke="#94A3B8" stroke-width="0.8"/>
      <line x1="54" y1="-4" x2="74" y2="-3" stroke="#94A3B8" stroke-width="0.8"/>
      <!-- Pencil -->
      <line x1="60" y1="-12" x2="80" y2="-12" stroke="#F2C94C" stroke-width="3"/>
      <line x1="80" y1="-12" x2="84" y2="-12" stroke="#2B1F14" stroke-width="3"/>
    </g>
    <!-- Student 1 (writing - looking down) -->
    <g transform="translate(110 308)">
      <!-- Body (red hoodie) -->
      <path d="M-22 12 L22 12 L26 44 L-26 44 Z" fill="#C0392B"/>
      <!-- Arms -->
      <ellipse cx="-12" cy="20" rx="6" ry="14" fill="#C0392B" transform="rotate(45 -12 20)"/>
      <ellipse cx="14" cy="22" rx="6" ry="14" fill="#C0392B" transform="rotate(-30 14 22)"/>
      <!-- Hands writing -->
      <circle cx="2" cy="34" r="3.5" fill="#F2C9A8"/>
      <circle cx="22" cy="38" r="3.5" fill="#F2C9A8"/>
      <!-- Neck/Head looking down -->
      <rect x="-3" y="2" width="6" height="8" fill="#F2C9A8"/>
      <ellipse cx="0" cy="-8" rx="13" ry="14" fill="#F2C9A8"/>
      <!-- Hair -->
      <path d="M-12 -16 Q-8 -22 0 -22 Q8 -22 12 -16 L12 -2 Q4 -2 -12 -2 Z" fill="#3A2818"/>
      <!-- Eyes (looking down) -->
      <ellipse cx="-4" cy="-4" rx="1.6" ry="0.8" fill="#2B1F14"/>
      <ellipse cx="4" cy="-4" rx="1.6" ry="0.8" fill="#2B1F14"/>
    </g>

    <!-- Desk 2 (middle) -->
    <g transform="translate(340 350)">
      <ellipse cx="50" cy="78" rx="56" ry="6" fill="#000" opacity="0.18"/>
      <rect x="0" y="0" width="100" height="16" fill="url(#desk)"/>
      <rect x="0" y="0" width="100" height="6" fill="#C9A269"/>
      <rect x="6" y="16" width="6" height="60" fill="#8B6A40"/>
      <rect x="88" y="16" width="6" height="60" fill="#8B6A40"/>
      <!-- Notebook -->
      <rect x="20" y="-12" width="42" height="14" fill="#F8F4EC" stroke="#A8896B" stroke-width="1.2"/>
      <line x1="24" y1="-7" x2="58" y2="-7" stroke="#94A3B8" stroke-width="0.8"/>
      <line x1="24" y1="-4" x2="58" y2="-4" stroke="#94A3B8" stroke-width="0.8"/>
      <!-- Highlighter -->
      <rect x="68" y="-10" width="22" height="6" fill="#F2C94C" rx="1"/>
      <rect x="86" y="-10" width="4" height="6" fill="#A8896B"/>
    </g>
    <!-- Student 2 (looking up at teacher) -->
    <g transform="translate(370 305)">
      <!-- Body (blue T-shirt) -->
      <path d="M-22 12 L22 12 L26 44 L-26 44 Z" fill="#2E78C4"/>
      <!-- Arms -->
      <ellipse cx="-22" cy="22" rx="5" ry="13" fill="#2E78C4"/>
      <ellipse cx="22" cy="22" rx="5" ry="13" fill="#2E78C4"/>
      <!-- Neck/Head looking up slightly -->
      <rect x="-3" y="0" width="6" height="10" fill="#E8A87C"/>
      <ellipse cx="0" cy="-12" rx="13" ry="14" fill="#E8A87C"/>
      <!-- Hair (curly) -->
      <path d="M-13 -18 Q-12 -28 0 -28 Q12 -28 13 -18 Q14 -10 8 -8 L-8 -8 Q-14 -10 -13 -18 Z" fill="#5C3A21"/>
      <!-- Eyes (looking up) -->
      <circle cx="-4" cy="-12" r="1.4" fill="#2B1F14"/>
      <circle cx="4" cy="-12" r="1.4" fill="#2B1F14"/>
      <!-- Mouth -->
      <path d="M-3 -6 Q0 -4 3 -6" stroke="#2B1F14" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Desk 3 (right) -->
    <g transform="translate(600 350)">
      <ellipse cx="50" cy="78" rx="56" ry="6" fill="#000" opacity="0.18"/>
      <rect x="0" y="0" width="100" height="16" fill="url(#desk)"/>
      <rect x="0" y="0" width="100" height="6" fill="#C9A269"/>
      <rect x="6" y="16" width="6" height="60" fill="#8B6A40"/>
      <rect x="88" y="16" width="6" height="60" fill="#8B6A40"/>
      <!-- Textbook (closed) -->
      <rect x="20" y="-14" width="48" height="16" fill="#1976D2" stroke="#0D4A85" stroke-width="1.2" rx="1"/>
      <text x="44" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">ENGLISH</text>
      <!-- Pen -->
      <line x1="74" y1="-8" x2="86" y2="-2" stroke="#2E7D32" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <!-- Student 3 (concentrated, slight smile) -->
    <g transform="translate(630 308)">
      <!-- Body (green hoodie) -->
      <path d="M-22 12 L22 12 L26 44 L-26 44 Z" fill="#2E7D32"/>
      <!-- Hood -->
      <path d="M-22 12 Q-22 0 0 -2 Q22 0 22 12 Z" fill="#205C24"/>
      <!-- Arms -->
      <ellipse cx="-14" cy="24" rx="5" ry="14" fill="#2E7D32" transform="rotate(20 -14 24)"/>
      <ellipse cx="14" cy="22" rx="5" ry="13" fill="#2E7D32" transform="rotate(-15 14 22)"/>
      <!-- Hand -->
      <circle cx="20" cy="34" r="3.5" fill="#D9A77C"/>
      <!-- Neck -->
      <rect x="-3" y="0" width="6" height="8" fill="#D9A77C"/>
      <!-- Head -->
      <ellipse cx="0" cy="-9" rx="13" ry="14" fill="#D9A77C"/>
      <!-- Hair -->
      <path d="M-13 -18 Q-13 -25 0 -25 Q13 -25 13 -18 L13 -10 Q4 -10 -10 -10 Z" fill="#1F1410"/>
      <!-- Eyes -->
      <circle cx="-4" cy="-10" r="1.3" fill="#2B1F14"/>
      <circle cx="4" cy="-10" r="1.3" fill="#2B1F14"/>
      <!-- Slight smile -->
      <path d="M-3 -3 Q0 -1 3 -3" stroke="#2B1F14" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Title corner badge -->
  <g transform="translate(20 20)">
    <rect x="0" y="0" width="156" height="26" rx="13" fill="#FFFFFF" opacity="0.85"/>
    <text x="78" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1976D2">CLASSROOM · LESSON</text>
  </g>
</svg>
