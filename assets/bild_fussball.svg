<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Fußballspiel: Junger Spieler sprintet mit dem Ball, andere Spieler hinter ihm, Tor im Hintergrund, sonniger Tag">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC4E8"/>
      <stop offset="100%" stop-color="#C5E6F4"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DA346"/>
      <stop offset="100%" stop-color="#3F7A2F"/>
    </linearGradient>
    <linearGradient id="pitch-stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CB453"/>
      <stop offset="100%" stop-color="#4A8C38"/>
    </linearGradient>
    <radialGradient id="sun2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE680" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFD24A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD24A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="200" fill="url(#sky2)"/>

  <!-- Sun -->
  <circle cx="660" cy="60" r="38" fill="#FFD24A"/>
  <circle cx="660" cy="60" r="72" fill="url(#sun2)" opacity="0.7"/>

  <!-- Clouds (very few) -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="120" cy="70" rx="46" ry="14"/>
    <ellipse cx="148" cy="62" rx="30" ry="12"/>
  </g>

  <!-- Pitch -->
  <rect y="200" width="800" height="300" fill="url(#pitch)"/>
  <!-- Pitch stripes -->
  <g opacity="0.4">
    <rect x="0" y="200" width="800" height="50" fill="url(#pitch-stripe)"/>
    <rect x="0" y="300" width="800" height="50" fill="url(#pitch-stripe)"/>
    <rect x="0" y="400" width="800" height="50" fill="url(#pitch-stripe)"/>
  </g>

  <!-- Pitch lines -->
  <!-- Center line -->
  <line x1="0" y1="220" x2="800" y2="220" stroke="#FFFFFF" stroke-width="2.4" opacity="0.85"/>
  <!-- Center circle (perspective ellipse) -->
  <ellipse cx="400" cy="240" rx="120" ry="22" fill="none" stroke="#FFFFFF" stroke-width="2.4" opacity="0.85"/>
  <circle cx="400" cy="240" r="3" fill="#FFFFFF" opacity="0.85"/>
  <!-- Side lines (vanishing) -->
  <line x1="60" y1="500" x2="320" y2="220" stroke="#FFFFFF" stroke-width="2.6" opacity="0.85"/>
  <line x1="740" y1="500" x2="480" y2="220" stroke="#FFFFFF" stroke-width="2.6" opacity="0.85"/>

  <!-- Goal in background (left side) -->
  <g transform="translate(150 195)">
    <!-- Posts -->
    <rect x="0" y="0" width="3" height="34" fill="#FFFFFF"/>
    <rect x="80" y="0" width="3" height="34" fill="#FFFFFF"/>
    <!-- Crossbar -->
    <rect x="0" y="0" width="83" height="3" fill="#FFFFFF"/>
    <!-- Net (lines suggesting net) -->
    <g stroke="#FFFFFF" stroke-width="0.6" opacity="0.6" fill="none">
      <line x1="3" y1="3" x2="80" y2="3"/>
      <line x1="6" y1="6" x2="78" y2="6"/>
      <line x1="9" y1="10" x2="76" y2="10"/>
      <line x1="12" y1="14" x2="74" y2="14"/>
      <line x1="15" y1="20" x2="71" y2="20"/>
      <line x1="18" y1="26" x2="68" y2="26"/>
      <line x1="22" y1="33" x2="64" y2="33"/>
      <line x1="14" y1="3" x2="14" y2="33"/>
      <line x1="28" y1="3" x2="28" y2="33"/>
      <line x1="42" y1="3" x2="42" y2="33"/>
      <line x1="56" y1="3" x2="56" y2="33"/>
      <line x1="70" y1="3" x2="70" y2="33"/>
    </g>
  </g>

  <!-- Background players (3 chasing) -->
  <g>
    <!-- Player far back center -->
    <g transform="translate(380 280)">
      <ellipse cx="0" cy="38" rx="14" ry="3" fill="#000" opacity="0.25"/>
      <!-- Legs -->
      <rect x="-6" y="20" width="5" height="20" rx="2" fill="#1A1A1A" transform="rotate(-15 -4 20)"/>
      <rect x="2" y="20" width="5" height="20" rx="2" fill="#1A1A1A" transform="rotate(20 4 20)"/>
      <!-- Body (white away kit) -->
      <path d="M-12 0 L12 0 L14 22 L-14 22 Z" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
      <!-- Arms -->
      <ellipse cx="-13" cy="10" rx="3" ry="9" fill="#FFFFFF" stroke="#1976D2" stroke-width="0.8" transform="rotate(-25 -13 10)"/>
      <ellipse cx="13" cy="10" rx="3" ry="9" fill="#FFFFFF" stroke="#1976D2" stroke-width="0.8" transform="rotate(30 13 10)"/>
      <!-- Head -->
      <circle cx="0" cy="-7" r="8" fill="#E8A87C"/>
      <path d="M-7 -10 Q-6 -16 0 -16 Q6 -16 7 -10 Q7 -6 4 -5 L-4 -5 Q-7 -6 -7 -10 Z" fill="#3A2818"/>
    </g>
    <!-- Player background right -->
    <g transform="translate(490 290)">
      <ellipse cx="0" cy="42" rx="16" ry="4" fill="#000" opacity="0.25"/>
      <rect x="-7" y="22" width="6" height="22" rx="2" fill="#1A1A1A" transform="rotate(-12 -5 22)"/>
      <rect x="2" y="22" width="6" height="22" rx="2" fill="#1A1A1A" transform="rotate(18 5 22)"/>
      <path d="M-13 0 L13 0 L16 24 L-16 24 Z" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
      <ellipse cx="-14" cy="10" rx="3.5" ry="10" fill="#FFFFFF" stroke="#1976D2" stroke-width="0.8" transform="rotate(-30 -14 10)"/>
      <ellipse cx="14" cy="10" rx="3.5" ry="10" fill="#FFFFFF" stroke="#1976D2" stroke-width="0.8" transform="rotate(35 14 10)"/>
      <circle cx="0" cy="-8" r="9" fill="#D9A77C"/>
      <path d="M-8 -12 Q-7 -18 0 -18 Q7 -18 8 -12 L8 -6 Q4 -6 -8 -6 Z" fill="#1F1410"/>
    </g>
    <!-- Player slightly closer left -->
    <g transform="translate(290 310)">
      <ellipse cx="0" cy="46" rx="18" ry="4" fill="#000" opacity="0.25"/>
      <rect x="-8" y="24" width="6" height="24" rx="2" fill="#1A1A1A" transform="rotate(-12 -5 24)"/>
      <rect x="2" y="24" width="6" height="24" rx="2" fill="#1A1A1A" transform="rotate(20 5 24)"/>
      <path d="M-15 0 L15 0 L18 26 L-18 26 Z" fill="#FFFFFF" stroke="#1976D2" stroke-width="1.2"/>
      <ellipse cx="-16" cy="11" rx="4" ry="12" fill="#FFFFFF" stroke="#1976D2" stroke-width="1" transform="rotate(-32 -16 11)"/>
      <ellipse cx="16" cy="11" rx="4" ry="12" fill="#FFFFFF" stroke="#1976D2" stroke-width="1" transform="rotate(38 16 11)"/>
      <circle cx="0" cy="-9" r="10" fill="#F2C9A8"/>
      <path d="M-9 -13 Q-8 -20 0 -20 Q8 -20 9 -13 L9 -8 Q4 -8 -9 -8 Z" fill="#5C3A21"/>
    </g>
  </g>

  <!-- Foreground player sprinting (large, in red kit) -->
  <g transform="translate(420 380)">
    <!-- Shadow -->
    <ellipse cx="0" cy="92" rx="46" ry="8" fill="#000" opacity="0.3"/>
    <!-- Back leg pushing off -->
    <g transform="rotate(-30 -10 30)">
      <rect x="-14" y="30" width="11" height="48" rx="4" fill="#1A1A1A"/>
      <!-- Boot back -->
      <ellipse cx="-9" cy="80" rx="14" ry="6" fill="#FFFFFF"/>
      <ellipse cx="-9" cy="80" rx="14" ry="6" fill="none" stroke="#C62828" stroke-width="1"/>
    </g>
    <!-- Front leg striding -->
    <g transform="rotate(35 8 35)">
      <rect x="3" y="32" width="12" height="50" rx="4" fill="#1A1A1A"/>
      <!-- Boot front -->
      <ellipse cx="9" cy="84" rx="15" ry="7" fill="#FFFFFF"/>
      <ellipse cx="9" cy="84" rx="15" ry="7" fill="none" stroke="#C62828" stroke-width="1"/>
    </g>
    <!-- Body (red shirt with number) -->
    <path d="M-26 5 L26 5 L32 55 L-32 55 Z" fill="#C62828"/>
    <!-- Number 9 on shirt -->
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">9</text>
    <!-- Collar -->
    <path d="M-10 5 Q0 12 10 5 L8 0 Q0 5 -8 0 Z" fill="#FFFFFF"/>
    <!-- Arms in motion -->
    <ellipse cx="-26" cy="22" rx="7" ry="20" fill="#C62828" transform="rotate(-50 -26 22)"/>
    <ellipse cx="26" cy="22" rx="7" ry="20" fill="#C62828" transform="rotate(60 26 22)"/>
    <!-- Hands -->
    <circle cx="-46" cy="6" r="5" fill="#F2C9A8"/>
    <circle cx="44" cy="42" r="5" fill="#F2C9A8"/>
    <!-- Neck -->
    <rect x="-4" y="-6" width="8" height="11" fill="#F2C9A8"/>
    <!-- Head -->
    <circle cx="0" cy="-18" r="16" fill="#F2C9A8"/>
    <!-- Hair (short dark) -->
    <path d="M-15 -22 Q-13 -36 0 -36 Q13 -36 15 -22 L13 -16 Q12 -22 0 -22 Q-12 -22 -13 -16 Z" fill="#3A2818"/>
    <!-- Eyebrows (focused) -->
    <path d="M-9 -22 L-3 -23" stroke="#2B1F14" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M3 -23 L9 -22" stroke="#2B1F14" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Eyes (focused, narrow) -->
    <ellipse cx="-5" cy="-19" rx="1.6" ry="1" fill="#2B1F14"/>
    <ellipse cx="5" cy="-19" rx="1.6" ry="1" fill="#2B1F14"/>
    <!-- Mouth (slightly open, determined) -->
    <ellipse cx="0" cy="-12" rx="3" ry="1.5" fill="#2B1F14"/>
  </g>

  <!-- Football at front player's foot -->
  <g transform="translate(450 462)">
    <ellipse cx="0" cy="14" rx="14" ry="3" fill="#000" opacity="0.35"/>
    <circle cx="0" cy="0" r="13" fill="#FFFFFF"/>
    <!-- Pentagons pattern -->
    <polygon points="0,-9 7,-3 4,5 -4,5 -7,-3" fill="#1A1A1A"/>
    <polygon points="-13,-3 -8,-7 -8,-1" fill="#1A1A1A" opacity="0.7"/>
    <polygon points="13,-3 8,-7 8,-1" fill="#1A1A1A" opacity="0.7"/>
    <polygon points="-7,9 -2,12 -8,5" fill="#1A1A1A" opacity="0.7"/>
    <polygon points="7,9 2,12 8,5" fill="#1A1A1A" opacity="0.7"/>
  </g>

  <!-- Motion lines behind player -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="350" y1="395" x2="378" y2="395"/>
    <line x1="340" y1="415" x2="370" y2="415"/>
    <line x1="345" y1="380" x2="370" y2="380"/>
    <line x1="355" y1="430" x2="378" y2="430"/>
  </g>

  <!-- Title corner badge -->
  <g transform="translate(20 20)">
    <rect x="0" y="0" width="160" height="26" rx="13" fill="#FFFFFF" opacity="0.85"/>
    <text x="80" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#C62828">FOOTBALL · MATCH</text>
  </g>
</svg>
